name: teconnectesupport
description: "Teconnect Support - Sistema de gestión de tickets y soporte"
publish_to: 'none'

version: 1.0.2

environment:
  sdk: ^3.10.0  # ← Esta línea es obligatoria

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  
  # UI y diseño
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  
  # Utilidades
  provider: ^6.1.2
  intl: ^0.19.0
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  http: ^1.2.2
  emoji_picker_flutter: ^2.1.1
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_keyboard_visibility: ^6.0.0
  record: ^5.2.1
  just_audio: ^0.9.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/